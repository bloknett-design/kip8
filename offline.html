<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КИП ИОС — Офлайн</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { 
        background: linear-gradient(180deg, #1a2233 0%, #17212b 40%, #0e1621 100%); 
        color: #e0e0e0; 
        min-height: 100vh; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        text-align: center; 
        padding: 20px;
    }
    .icon { width: 80px; height: 80px; margin-bottom: 24px; opacity: 0.6; }
    .icon svg { width: 100%; height: 100%; stroke: #4a8fc7; fill: none; stroke-width: 1.5; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #e0e0e0; }
    p { font-size: 15px; color: rgba(180, 200, 220, 0.7); line-height: 1.6; max-width: 320px; margin-bottom: 24px; }
    .retry-btn {
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: #fff;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }
    .retry-btn:active { transform: scale(0.97); opacity: 0.9; }
    .status { margin-top: 16px; font-size: 12px; color: rgba(180, 200, 220, 0.4); }
</style>
</head>
<body>
    <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M1 4h22M2 4v16a2 2 0 002 2h16a2 2 0 002-2V4"/><path d="M12 8v4M12 16h.01"/></svg>
    </div>
    <h1>Нет подключения</h1>
    <p>Приложение КИП ИОС работает в офлайн-режиме. Проверьте подключение к интернету для обновления данных.</p>
    <button class="retry-btn" onclick="window.location.reload()">Повторить попытку</button>
    <div class="status" id="status">Проверка соединения...</div>

    <script>
        // Check if we're actually offline or if it's a different error
        window.addEventListener('load', function() {
            if (navigator.onLine) {
                document.getElementById('status').textContent = 'Соединение восстановлено. Перезагрузка...';
                setTimeout(function() { window.location.href = '/'; }, 1500);
            } else {
                document.getElementById('status').textContent = 'Ожидание подключения...';
            }
        });
        window.addEventListener('online', function() {
            document.getElementById('status').textContent = 'Соединение восстановлено. Перезагрузка...';
            setTimeout(function() { window.location.href = '/'; }, 1000);
        });
    </script>
</body>
</html>
